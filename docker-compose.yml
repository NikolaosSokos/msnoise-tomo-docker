name: msnoise-tomo

# Shared definition reused by every service.
x-common: &common
  # Prebuilt image published to GitHub Container Registry.
  # Clients just run `docker compose pull` (no local build needed).
  # `build:` is kept so maintainers can still rebuild locally.
  image: ghcr.io/nikolaossokos/msnoise-tomo-docker:latest
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  working_dir: /project
  volumes:
    - ./project:/project       # MSNoise project + SQLite DB (persistent)
    - ./data:/data:ro          # your seismic data, mounted read-only

services:
  # ---- Command-line interface (default) --------------------------------
  # Usage:  docker compose run --rm msnoise msnoise <command>
  msnoise:
    <<: *common
    command: ["msnoise", "info"]

  # ---- Web admin GUI ---------------------------------------------------
  # Usage:  docker compose --profile web up
  # Then open http://localhost:5000
  web:
    <<: *common
    profiles: ["web"]
    command: ["msnoise", "admin", "-p", "5000"]
    # Bound to localhost only so it is NOT exposed to the local network.
    ports:
      - "127.0.0.1:${WEB_PORT:-5000}:5000"

  # ---- JupyterLab ------------------------------------------------------
  # Usage:  docker compose --profile jupyter up
  # Then open http://localhost:8888  (token from .env, default: msnoise)
  jupyter:
    <<: *common
    profiles: ["jupyter"]
    command:
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --ServerApp.token=${JUPYTER_TOKEN:-msnoise}
      - --notebook-dir=/project
    # Bound to localhost only: JupyterLab can run arbitrary code, so it must
    # never be reachable from the local network.
    ports:
      - "127.0.0.1:${JUPYTER_PORT:-8888}:8888"

  # ---- MySQL backend (optional) ----------------------------------------
  # Activate by adding --profile mysql AND setting DB_TECH=mysql in .env.
  # Service name is "mysql" -> that is the hostname the app connects to
  # (MYSQL_HOST=mysql in .env).
  mysql:
    image: mysql:8.0
    profiles: ["mysql"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-msnoise}
      MYSQL_USER: ${MYSQL_USER:-msnoise}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-msnoise}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootmsnoise}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootmsnoise}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
