name: msnoise-tomo

# Shared definition reused by every service.
x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: msnoise-tomo:latest
  env_file: .env
  working_dir: /project
  volumes:
    - ./project:/project       # MSNoise project + SQLite DB (persistent)
    - ./data:/data:ro          # your seismic data, mounted read-only

services:
  # ---- Command-line interface (default) --------------------------------
  # Usage:  docker compose run --rm msnoise msnoise <command>
  msnoise:
    <<: *common
    command: ["msnoise", "info"]

  # ---- Web admin GUI ---------------------------------------------------
  # Usage:  docker compose --profile web up
  # Then open http://localhost:5000
  web:
    <<: *common
    profiles: ["web"]
    command: ["msnoise", "admin", "-p", "5000"]
    ports:
      - "${WEB_PORT:-5000}:5000"

  # ---- JupyterLab ------------------------------------------------------
  # Usage:  docker compose --profile jupyter up
  # Then open http://localhost:8888  (token from .env, default: msnoise)
  jupyter:
    <<: *common
    profiles: ["jupyter"]
    command:
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --ServerApp.token=${JUPYTER_TOKEN:-msnoise}
      - --notebook-dir=/project
    ports:
      - "${JUPYTER_PORT:-8888}:8888"

  # ---- MariaDB backend (optional) --------------------------------------
  # Activate by adding --profile mysql AND setting DB_TECH=mysql in .env
  mariadb:
    image: mariadb:11
    profiles: ["mysql"]
    environment:
      MARIADB_DATABASE: ${MYSQL_DB:-msnoise}
      MARIADB_USER: ${MYSQL_USER:-msnoise}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-msnoise}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootmsnoise}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mariadb_data:
